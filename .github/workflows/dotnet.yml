name: .NET

on:
  workflow_dispatch:
  push:
    branches: "*"
    tags: "v*"
  pull_request:
    branches: "*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Restore dependencies
        run: dotnet restore

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Determine assembly version
        id: version
        shell: pwsh
        run: |
          $version = "0.0.0.0"

          if ($env:GITHUB_REF -like "refs/tags/v*") {
              $tag = $env:GITHUB_REF.Substring(11)   # Remove refs/tags/
              $tag = $tag.TrimStart('v')

              $parts = $tag.Split('.')

              while ($parts.Count -lt 4) {
                  $parts += "0"
              }

              if ($parts.Count -gt 4) {
                  $parts = $parts[0..3]
              }

              $version = $parts -join '.'
          }

          "assembly_version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Assembly version: $version"

      - name: Build debug
        run: >
          msbuild MinecraftInsomnia.sln
          /t:Build
          /p:Configuration=Debug
          /p:Version=${{ steps.version.outputs.assembly_version }}
          /p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          /p:FileVersion=${{ steps.version.outputs.assembly_version }}

      - name: Build release
        run: >
          msbuild MinecraftInsomnia.sln
          /t:Build
          /p:Configuration=Release
          /p:Version=${{ steps.version.outputs.assembly_version }}
          /p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          /p:FileVersion=${{ steps.version.outputs.assembly_version }}

      - name: Publish debug build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MinecraftInsomnia-Debug
          path: MinecraftInsomnia/bin/Debug/net481/*

      - name: Publish release build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MinecraftInsomnia-Release
          path: MinecraftInsomnia/bin/Release/net481/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Restore build artifacts
        uses: actions/download-artifact@v8
        with:
          name: MinecraftInsomnia-Release

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "Minecraft Insomnia v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          draft: false
          generate_release_notes: true
          files: |
            *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
