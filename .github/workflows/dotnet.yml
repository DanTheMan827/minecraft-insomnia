name: .NET

on:
  workflow_dispatch:
  push:
    branches: "*"
    tags: "v*"
  pull_request:
    branches: "*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Restore dependencies
        run: dotnet restore

      - name: setup-msbuild
        uses: microsoft/setup-msbuild@v3

      - name: Build debug
        run: msbuild MinecraftInsomnia.sln /t:Build /p:Configuration=Debug

      - name: Build release
        run: msbuild MinecraftInsomnia.sln /t:Build /p:Configuration=Release

      - name: Publish debug build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MinecraftInsomnia-Debug
          path: MinecraftInsomnia/bin/Debug/net481/*

      - name: Publish release build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MinecraftInsomnia-Release
          path: MinecraftInsomnia/bin/Release/net481/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Restore build artifacts
        uses: actions/download-artifact@v8
        with:
          name: MinecraftInsomnia-Release

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${GITHUB_REF#refs/tags/v}"

          echo "version=$VERSION" | tee -a "$GITHUB_OUTPUT"

      - name: Create a release using action-github-release
        uses: softprops/action-gh-release@v3
        with:
          name: "Minecraft Insomnia v${{ steps.version.outputs.version}}"
          tag_name: "v${{ steps.version.outputs.version}}"
          draft: false
          generate_release_notes: true
          files: |
            *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
